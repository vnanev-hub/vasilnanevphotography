<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vasil Nanev Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 0; }
        header { padding: 50px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .logo-img { max-width: 150px; cursor: pointer; }
        .logo-text { font-size: 11px; letter-spacing: 5px; text-transform: uppercase; margin-top: 15px; color: #666; cursor: pointer; }
        nav { display: flex; justify-content: center; gap: 30px; font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #666; margin-top: 30px; }
        nav span { cursor: pointer; transition: 0.3s; }
        nav span:hover { color: #fff; }
        main { max-width: 900px; margin: 60px auto; padding: 0 20px; min-height: 50vh; }
        
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; max-width: 800px; margin: 0 auto; }
        .album-card { border: 1px solid #222; padding: 20px; text-align: center; cursor: pointer; transition: 0.4s; }
        .album-card:hover { border: 1px solid #fff; }
        .album-card h2 { font-weight: 200; font-size: 12px; letter-spacing: 4px; margin: 15px 0 0 0; }
        
        .buy-btn { background: none; border: 1px solid #fff; color: #fff; padding: 10px 25px; cursor: pointer; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; margin-top: 15px; }
        .buy-btn:hover { background: #fff; color: #000; }
        
        .about-container { text-align: center; line-height: 1.8; color: #bbb; max-width: 700px; margin: 0 auto; }
        .about-container h2 { letter-spacing: 5px; font-weight: 200; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #222; color: #fff; }
        .social-icons { display: flex; justify-content: center; gap: 40px; margin-top: 40px; font-size: 24px; }
        #topBtn { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #000; padding: 8px 12px; cursor: pointer; border: none; font-size: 10px; }
    </style>
</head>
<body>

<header>
    <img src="/logo.png" class="logo-img" onclick="loadWork()" alt="Logo">
    <div class="logo-text" onclick="loadWork()">Vasil Nanev Photography</div>
    <nav>
        <span onclick="loadWork()">Work</span>
        <span onclick="loadAbout()">About</span>
        <span onclick="loadContact()">Contact</span>
        <span>Cart (0)</span>
    </nav>
</header>

<main id="content"></main>
<button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">UP ↑</button>

<script>
    const content = document.getElementById('content');

    function loadWork() {
        fetch('/api/albums').then(res => res.json()).then(albums => {
            content.innerHTML = `<div class="work-grid">${albums.map(a => `
                <div class="album-card" onclick="openAlbum('${a}')">
                    <img src="/images/${a}/cover.jpg" onerror="this.src='/images/${a}/1.jpg'" style="width:100%; height:180px; object-fit:cover;">
                    <h2>${a.toUpperCase()}</h2>
                </div>`).join('')}</div>`;
        });
    }

    function openAlbum(album) {
        fetch(`/api/photos/${album}`).then(res => res.json()).then(photos => {
            content.innerHTML = `<span style="cursor:pointer; color:#666; font-size:11px;" onclick="loadWork()">← BACK</span>` + photos.map(p => `
                <div style="margin-top:50px; text-align:center;">
                    <img src="/images/${album}/${p}" style="width:100%; max-width:700px;">
                    <p style="font-size:12px; color:#666; margin-top:15px;">65 €</p>
                    <button class="buy-btn">Add to Cart</button>
                </div>`).join('') + '<br><br>';
        });
    }

    function loadAbout() {
        content.innerHTML = `
            <div class="about-container">
                <h2>ABOUT THE ARTIST</h2>
                <img src="/profile.jpg" style="width:100%; margin-bottom:30px;">
                <p>Vasil Nanev is an internationally acclaimed photographer whose work redefines the boundaries between commercial precision and artistic intuition. With a career spanning over a decade, his portfolio is a testament to the versatility of his lens, covering the complex geometries of <strong>Architecture</strong>, the raw candidness of <strong>Street and Landscape</strong>, and the sophisticated allure of <strong>Fashion and Portraiture</strong>.</p>
                <p>Recognized by premier global photography platforms, Nanev’s aesthetic is characterized by a masterful command of light and structural composition. Each print is treated as a museum-grade asset, reflecting a commitment to visual excellence that bridges the gap between digital innovation and traditional fine art sensibilities.</p>
            </div>`;
    }

    function loadContact() {
        content.innerHTML = `
            <div style="max-width:500px; margin:0 auto;">
                <h2 style="text-align:center; margin-bottom:40px; letter-spacing:3px;">CONTACT</h2>
                <form action="https://formspree.io/f/mpqydqop" method="POST">
                    <div class="form-group"><label>Name *</label><input type="text" name="name" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" name="email" required></div>
                    <div class="form-group"><label>Message *</label><textarea name="message" rows="5" required></textarea></div>
                    <button type="submit" class="buy-btn" style="width:100%; padding:15px;">Submit</button>
                </form>
                <div class="social-icons">
                    <a href="https://instagram.com/vnanev" target="_blank" style="color:red;"><i class="fab fa-instagram"></i></a>
                    <a href="mailto:vnanev@gmail.com" style="color:white;"><i class="fas fa-envelope"></i></a>
                </div>
            </div>`;
    }

    window.onload = loadWork;
</script>
</body>
</html>
